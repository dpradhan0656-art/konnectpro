    <!-- On chunk/MIME load error, refresh once to recover from stale cache after deploy. -->
    <script>
      (function() {
        var key = 'kshatr_chunk_error_reload';
        window.onerror = function(msg, source, line, col, err) {
          var s = (msg || '') + (source || '');
          if ((s.indexOf('Loading chunk failed') !== -1 || s.indexOf('MIME type') !== -1) && !sessionStorage.getItem(key)) {
            try { sessionStorage.setItem(key, '1'); } catch (e) {}
            window.location.reload();
          }
        };
      })();
    </script>
